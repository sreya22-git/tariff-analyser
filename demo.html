<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sourcing Desk — Tariff-aware sourcing decisions</title>
<style>
  :root{
    --bg:#eef2f7; --card:#ffffff; --soft:#f5f8fc; --ocean:#eaf1f7;
    --ink:#152232; --muted:#5c6c80; --faint:#8ea0b4; --line:#e3eaf2;
    --brand:#0e7c86; --brand-2:#17a7a0; --brand-ink:#0a5a5f; --brand-soft:#e2f4f3;
    --plum:#6d5bd0; --plum-soft:#efecfb;
    --red:#d9564a; --red-bg:#fbecea; --amber:#cd8a2c; --amber-bg:#faf1e1; --green:#2e9d6e; --green-bg:#e7f6ef;
    --mono:ui-monospace,"SFMono-Regular","Cascadia Code","JetBrains Mono",Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(20,40,70,.05),0 10px 26px -14px rgba(20,40,70,.18);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  button{font-family:var(--sans);cursor:pointer} h1,h2,h3,h4{margin:0}

  /* top bar */
  .topbar{background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;
    gap:12px;padding:11px 20px;position:sticky;top:0;z-index:30}
  .logo{display:flex;align-items:center;gap:9px}
  .logo svg{width:24px;height:24px}
  .logo b{font-weight:700;letter-spacing:-.01em} .logo b i{color:var(--brand);font-style:normal}
  .divider{width:1px;height:18px;background:var(--line)}
  .product{font-size:13px;font-weight:600;color:var(--muted)}
  .persona{margin-left:auto;display:flex;align-items:center;gap:9px;background:var(--soft);
    border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 12px;font-size:12.5px}
  .persona .av{width:24px;height:24px;border-radius:50%;background:var(--plum-soft);color:var(--plum);
    display:grid;place-items:center;font-weight:700;font-size:11px}
  .persona b{font-weight:600}
  .tourbtn{border:1px solid var(--brand);background:var(--brand-soft);color:var(--brand-ink);
    border-radius:9px;padding:8px 13px;font-weight:600;font-size:13px;margin-left:12px}
  .tourbtn:hover{background:#d3eeec}

  .app{display:grid;grid-template-columns:1fr 360px;gap:16px;max-width:1360px;margin:0 auto;padding:18px 20px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}

  /* kpi ribbon */
  .ribbon{grid-column:1/3;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:3px}
  .kpi .lbl{font-size:11.5px;color:var(--muted);font-weight:600}
  .kpi .val{font-family:var(--mono);font-size:23px;font-weight:600;letter-spacing:-.02em}
  .kpi .sub{font-size:11.5px;color:var(--faint)}
  .kpi.red .val{color:var(--red)} .kpi.amber .val{color:var(--amber)} .kpi.plum .val{color:var(--plum)}

  /* left column */
  .stage{position:relative;min-height:560px}
  .stagehead{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .stagehead h3{font-size:15px}
  .back{border:1px solid var(--line);background:var(--soft);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600;color:var(--muted)}
  .back:hover{color:var(--brand-ink);border-color:var(--brand)}
  .legend{margin-left:auto;display:flex;gap:12px;font-size:11.5px;color:var(--muted);align-items:center}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:-1px}

  /* MAP */
  .mapwrap{padding:8px 10px 14px;background:linear-gradient(180deg,#f2f7fb,#eaf1f7);border-radius:0 0 14px 14px}
  svg.map{width:100%;height:auto;display:block}
  .grat{stroke:#d4e0ec;stroke-width:.6;fill:none}
  .arc{fill:none;stroke:var(--brand);stroke-width:1.4;opacity:.32;stroke-dasharray:5 6;
    animation:flow 1.4s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-22}}
  .cnode{cursor:pointer;transition:.15s}
  .cnode:hover{filter:brightness(.96)}
  .cnode .halo{opacity:.0}
  .cnode.red .halo{opacity:.5;animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{r:12;opacity:.5}100%{r:30;opacity:0}}
  .clabel{font-size:10.5px;fill:var(--muted);font-family:var(--mono);pointer-events:none}
  .plant{fill:var(--plum)}
  .maphint{text-align:center;color:var(--faint);font-size:12.5px;padding:6px 0 2px}

  /* COUNTRY VIEW */
  .cview{display:none;padding:16px 18px}
  .cview.on{display:block}
  .chead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .flag{width:34px;height:24px;border-radius:5px;background:var(--soft);border:1px solid var(--line);
    display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--muted);font-family:var(--mono)}
  .chead h2{font-size:19px} .chead .csub{font-size:12.5px;color:var(--muted)}
  .cstats{display:flex;gap:20px;margin:12px 0 14px;flex-wrap:wrap}
  .cstat .cn{font-family:var(--mono);font-size:18px;font-weight:600}
  .cstat .cl{font-size:11.5px;color:var(--muted)}
  .cstat.red .cn{color:var(--red)}
  .partlist{border-top:1px solid var(--line)}
  .part{border-bottom:1px solid var(--line)}
  .parthead{display:flex;align-items:center;gap:12px;padding:12px 2px;cursor:pointer}
  .parthead:hover{background:var(--soft)}
  .parthead .chev{color:var(--faint);font-size:11px;transition:.2s}
  .part.open .chev{transform:rotate(90deg)}
  .parthead .pnm{font-weight:600;min-width:180px;font-size:13.5px}
  .parthead .pm{flex:1;display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .parthead .pm b{color:var(--ink);font-family:var(--mono);font-weight:600}
  .band{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
  .band.Red{background:var(--red-bg);color:var(--red)} .band.Amber{background:var(--amber-bg);color:var(--amber)} .band.Green{background:var(--green-bg);color:var(--green)}
  .decision{display:none;padding:4px 2px 18px}
  .part.open .decision{display:block}
  .dhelp{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:14px}
  .dhelp .dh{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:10px}
  .alt{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:9px 10px;border-radius:9px;margin-bottom:7px;
    background:var(--card);border:1px solid var(--line)}
  .alt.best{border-color:var(--green);background:var(--green-bg)}
  .alt .ac{font-weight:600;font-size:13px} .alt .ac .rec{font-size:10px;font-weight:700;color:var(--green);margin-left:7px}
  .alt .am{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right}
  .alt .save{font-family:var(--mono);font-size:13px;font-weight:600;text-align:right}
  .save.up{color:var(--green)} .save.down{color:var(--red)}
  .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .abtn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--ink)}
  .abtn:hover{border-color:var(--brand);color:var(--brand-ink)}
  .abtn.prim{background:linear-gradient(180deg,var(--brand-2),var(--brand));border:none;color:#fff}
  .logged{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--green);
    background:var(--green-bg);border:1px solid #c5ecda;border-radius:8px;padding:6px 11px;margin-top:12px}

  /* right column */
  .side{display:flex;flex-direction:column;min-height:560px}
  .tabs{display:flex;gap:6px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .tab{border:1px solid var(--line);background:var(--soft);border-radius:9px;padding:7px 14px;font-weight:600;font-size:12.5px;color:var(--muted)}
  .tab.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .tabbody{flex:1;display:flex;flex-direction:column;min-height:0}

  /* insights */
  .insights{padding:14px 16px;overflow:auto}
  .insight{display:flex;gap:10px;padding:12px 0;border-top:1px solid var(--line);font-size:13px}
  .insight:first-child{border-top:none}
  .insight .in{flex:0 0 20px;height:20px;border-radius:50%;background:var(--brand-soft);color:var(--brand);
    display:grid;place-items:center;font-size:11px;font-family:var(--mono);font-weight:700}

  /* assistant */
  .asst{display:none;flex-direction:column;flex:1;min-height:0}
  .asst.on{display:flex}
  .chat{flex:1;overflow:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .bubble{max-width:92%;padding:11px 13px;border-radius:13px;font-size:13px;line-height:1.5}
  .bubble.a{background:var(--soft);border:1px solid var(--line);border-top-left-radius:4px;align-self:flex-start}
  .bubble.u{background:var(--brand);color:#fff;border-top-right-radius:4px;align-self:flex-end}
  .bubble ul{margin:8px 0 0;padding-left:18px} .bubble li{margin:3px 0}
  .bubble b{font-weight:700}
  .chips{display:flex;gap:7px;flex-wrap:wrap;padding:0 16px 10px}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 12px;font-size:12px;color:var(--brand-ink);font-weight:600}
  .chip:hover{background:var(--brand-soft);border-color:var(--brand)}
  .composer{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line)}
  .composer input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-size:13px;font-family:var(--sans)}
  .composer input:focus{outline:2px solid var(--brand-soft);border-color:var(--brand)}
  .composer button{border:none;background:var(--brand);color:#fff;border-radius:10px;padding:0 15px;font-weight:600}

  .scenbar{display:none;align-items:center;gap:10px;background:var(--amber-bg);border:1px solid #ecd7ab;
    border-radius:10px;padding:9px 13px;margin:0 0 14px;font-size:12.5px;color:#8a5a10;font-weight:600}
  .scenbar.on{display:flex}
  .scenbar button{margin-left:auto;border:1px solid #e0c088;background:#fff;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;color:#8a5a10}

  /* tour */
  .t-back{position:fixed;inset:0;background:rgba(10,20,32,.55);z-index:900;display:none}
  .t-hi{position:relative;z-index:950;box-shadow:0 0 0 3px var(--brand),0 0 0 9px rgba(14,124,134,.25);border-radius:14px}
  .t-card{position:fixed;z-index:960;width:320px;background:#fff;border:1px solid var(--brand);border-radius:14px;
    padding:16px 18px;box-shadow:0 30px 70px -24px rgba(10,20,32,.5);display:none}
  .t-card .st{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);font-weight:700}
  .t-card h4{margin:7px 0 6px;font-size:15px}
  .t-card p{margin:0;color:var(--muted);font-size:13px}
  .t-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
  .t-dots{display:flex;gap:5px} .t-dots i{width:6px;height:6px;border-radius:50%;background:var(--line)} .t-dots i.on{background:var(--brand)}
  .t-act{display:flex;gap:8px}
  .t-act .lk{background:none;border:none;color:var(--muted);font-size:12.5px} .t-act .lk:hover{color:var(--ink)}
  .t-act .nx{border:none;background:var(--brand);color:#fff;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px}
  .t-act .bk{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;font-weight:600;font-size:13px}

  @media(max-width:980px){.app{grid-template-columns:1fr}.ribbon{grid-column:1;grid-template-columns:repeat(2,1fr)}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" fill="#0e7c86"/>
      <circle cx="16" cy="16" r="13" stroke="#0a5a5f" stroke-width="1"/>
      <path d="M6 16h20M16 6v20M9 9l14 14M23 9L9 23" stroke="#bfeae7" stroke-width="1" opacity=".6"/>
      <circle cx="16" cy="16" r="3.4" fill="#fff"/></svg>
    <b>Sourcing<i>Desk</i></b>
  </div>
  <span class="divider"></span>
  <span class="product">Tariff-aware sourcing decisions</span>
  <div class="persona"><span class="av">B</span><span>Buyer workspace · <b>Passives &amp; Displays</b></span></div>
  <button class="tourbtn" id="tourBtn">Guided tour</button>
</div>

<div class="app">
  <!-- KPI ribbon -->
  <div class="ribbon" id="ribbon"></div>

  <!-- LEFT: map / country stage -->
  <div class="card stage" id="stage">
    <div class="stagehead">
      <button class="back" id="backBtn" style="display:none">← Map</button>
      <h3 id="stageTitle">Your sourcing map</h3>
      <div class="legend"><span><i style="background:#d9564a"></i>high exposure</span>
        <span><i style="background:#cd8a2c"></i>watch</span>
        <span><i style="background:#93a0b0"></i>clear</span>
        <span><i style="background:#6d5bd0"></i>your plant</span></div>
    </div>
    <!-- map -->
    <div class="mapwrap" id="mapView">
      <svg class="map" id="map" viewBox="0 0 680 360" role="img" aria-label="Sourcing map"></svg>
      <div class="maphint">Tap a country to see what's exposed and how to fix it.</div>
    </div>
    <!-- country drill-in -->
    <div class="cview" id="cview"></div>
  </div>

  <!-- RIGHT: assistant + insights -->
  <div class="card side" id="side">
    <div class="tabs">
      <button class="tab on" data-tab="asst" id="tabAsst">AI assistant</button>
      <button class="tab" data-tab="ins" id="tabIns">Insights</button>
    </div>
    <div class="tabbody">
      <div class="asst on" id="asstPane">
        <div class="chat" id="chat"></div>
        <div class="chips" id="chips"></div>
        <div class="composer">
          <input id="ask" placeholder="Ask about your sourcing risk…" autocomplete="off">
          <button id="send">Ask</button>
        </div>
      </div>
      <div class="insights" id="insPane" style="display:none"></div>
    </div>
  </div>
</div>

<!-- tour -->
<div class="t-back" id="tBack"></div>
<div class="t-card" id="tCard">
  <div class="st" id="tStep"></div><h4 id="tTitle"></h4><p id="tBody"></p>
  <div class="t-nav"><div class="t-dots" id="tDots"></div>
    <div class="t-act"><button class="lk" id="tSkip">Skip</button>
      <button class="bk" id="tBack2">Back</button><button class="nx" id="tNext">Next</button></div></div>
</div>

const CC=DATA.totals.cost_cap, CW=DATA.crit_w;
let scenario=null, selCountry=null, decisions={};

const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const money=v=>{const a=Math.abs(v);return (a>=1e6?'$'+(v/1e6).toFixed(2)+'M':a>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v));};
const clsx=s=>(s||'').replace(/[^A-Za-z]/g,'');

function calc(p){
  let d=p.base_delta;
  if(scenario && p.country===scenario.country && (!scenario.category||p.category===scenario.category)) d+=scenario.delta;
  const after=p.unit_cost*(1+d/100), impact=(after-p.unit_cost)*p.volume;
  let s=45*Math.min(Math.max(impact,0)/CC,1)+(d>0?12:0)+CW[p.crit]+(p.single_source?14:0)+6*(1-p.otd/100);
  s=Math.min(Math.round(s*10)/10,100);
  let band=s>=50?'Red':s>=25?'Amber':'Green'; if(d>0&&band==='Green')band='Amber';
  return {delta:d,after,impact,band};
}
const view=()=>DATA.parts.map(p=>({...p,...calc(p)}));

/* ---- geo ---- */
const COORD={China:[35,105],Taiwan:[23.7,121],'South Korea':[36.5,127.8],Japan:[36,138],
  Vietnam:[16,108],Malaysia:[4.2,102],Thailand:[15,101],Mexico:[23,-102],Germany:[51,10],
  USA:[39,-98],India:[22,79],Philippines:[13,122]};
const PLANT=[34,-96];
const W=680,H=360, px=lon=>(lon+180)/360*W, py=lat=>(90-lat)/180*H;

function countryAgg(v){
  const m={};
  v.forEach(p=>{const c=m[p.country]||(m[p.country]={spend:0,impact:0,red:0,amber:0,hit:0,parts:[]});
    c.spend+=p.spend;c.impact+=p.impact;if(p.band==='Red')c.red++;if(p.band==='Amber')c.amber++;if(p.delta>0)c.hit++;c.parts.push(p);});
  return m;
}
function renderMap(){
  const v=view(), agg=countryAgg(v);
  const spends=Object.values(agg).map(a=>a.spend), maxSp=Math.max(...spends,1);
  const cx=px(PLANT[1]), cy=py(PLANT[0]);
  let g='';
  for(let lat=-60;lat<=75;lat+=30) g+=`<line class="grat" x1="0" y1="${py(lat)}" x2="${W}" y2="${py(lat)}"/>`;
  for(let lon=-150;lon<=150;lon+=30) g+=`<line class="grat" x1="${px(lon)}" y1="0" x2="${px(lon)}" y2="${H}"/>`;
  // arcs
  let arcs='';
  Object.keys(agg).forEach(c=>{ if(c==='USA'||!COORD[c])return; const x=px(COORD[c][1]),y=py(COORD[c][0]);
    const mx=(x+cx)/2, my=Math.min(y,cy)-46;
    arcs+=`<path class="arc" d="M${x} ${y} Q${mx} ${my} ${cx} ${cy}"/>`; });
  // nodes
  let nodes='';
  Object.entries(agg).forEach(([c,a])=>{ if(!COORD[c])return; const x=px(COORD[c][1]),y=py(COORD[c][0]);
    const r=7+15*Math.sqrt(a.spend/maxSp);
    const band=a.red?'red':a.amber?'amber':'clear';
    const col=a.red?'#d9564a':a.amber?'#cd8a2c':'#93a0b0';
    nodes+=`<g class="cnode ${band}" data-c="${c}">
      <circle class="halo" cx="${x}" cy="${y}" r="12" fill="${col}"/>
      <circle cx="${x}" cy="${y}" r="${r}" fill="${col}" fill-opacity=".85" stroke="#fff" stroke-width="1.5"/>
      <text class="clabel" x="${x}" y="${y+r+12}" text-anchor="middle">${c}</text></g>`; });
  // plant
  const plant=`<g><path class="plant" d="M${cx} ${cy-11} L${cx+10} ${cy} L${cx} ${cy+11} L${cx-10} ${cy} Z" stroke="#fff" stroke-width="1.5"/>
    <text class="clabel" x="${cx}" y="${cy+24}" text-anchor="middle" style="fill:#6d5bd0;font-weight:700">Your plant</text></g>`;
  $('#map').innerHTML=g+arcs+nodes+plant;
  $$('#map .cnode').forEach(n=>n.addEventListener('click',()=>openCountry(n.dataset.c)));
}

/* ---- country drill-in ---- */
const catOrig={};
DATA.parts.forEach(p=>{(catOrig[p.category]??={});const o=(catOrig[p.category][p.country]??={n:0,d:0,hit:0});o.n++;if(p.base_delta>0){o.d+=p.base_delta;o.hit++;}});
const avgDelta=(cat,c)=>{const o=catOrig[cat]&&catOrig[cat][c];return o&&o.hit?o.d/o.hit:0;};
const premium=c=>c==='USA'?0.08:c==='Mexico'?0.05:0.04;

function alternatives(p){
  const origins=new Set(Object.keys(catOrig[p.category]||{})); origins.add('USA');
  const cur=p.after*p.volume; const cands=[];
  origins.forEach(c=>{ if(c===p.country)return; const d=avgDelta(p.category,c),pr=premium(c);
    const unit=p.unit_cost*(1+d/100)*(1+pr); cands.push({country:c==='USA'?'USA (domestic)':c,unit,annual:unit*p.volume,d,save:cur-unit*p.volume}); });
  cands.sort((a,b)=>b.save-a.save);
  return {cur,cands:cands.slice(0,3)};
}
function partDecision(p){
  const {cur,cands}=alternatives(p);
  const best=cands[0];
  const rows=cands.map((c,i)=>`
    <div class="alt ${i===0&&c.save>0?'best':''}">
      <div class="ac">${c.country}${i===0&&c.save>0?'<span class="rec">recommended</span>':''}
        <div class="faint mono" style="font-size:11px">${c.d>0?'+'+c.d.toFixed(0)+'% tariff':'no tariff'} · +${(premium(c.country.includes('USA')?'USA':c.country)*100).toFixed(0)}% switch cost</div></div>
      <div class="am">$${c.unit.toFixed(3)}/unit<br>${money(c.annual)}/yr</div>
      <div class="save ${c.save>0?'up':'down'}">${c.save>0?'save ':'+'}${money(Math.abs(c.save))}</div>
    </div>`).join('');
  const dcs=decisions[p.id];
  const rec = best&&best.save>0
    ? `Re-source to <b>${best.country}</b> to save ${money(best.save)}/yr, or add it as a second source to de-risk.`
    : `No cheaper origin — add a second source and file for a tariff exclusion on HS ${p.hs}.`;
  return `<div class="dhelp">
    <div class="dh">Sourcing options — current: ${p.country}, ${money(cur)}/yr landed</div>
    ${rows}
    <div style="font-size:12.5px;margin-top:10px" class="muted">${rec}</div>
    ${dcs? `<div class="logged">✓ Decision logged: ${dcs}</div>`
      : `<div class="actions">
          <button class="abtn prim" data-act="Re-source" data-id="${p.id}">Re-source</button>
          <button class="abtn" data-act="Second-source" data-id="${p.id}">Add second source</button>
          <button class="abtn" data-act="File exclusion" data-id="${p.id}">File exclusion</button>
          <button class="abtn" data-act="Accept & monitor" data-id="${p.id}">Accept &amp; monitor</button>
        </div>`}
  </div>`;
}

  const v=view().filter(p=>p.country===c);

  const parts=[...v].sort((a,b)=>b.impact-a.impact);
  $('#cview').innerHTML=`
    <div class="chead"><div class="flag">${c.slice(0,2).toUpperCase()}</div>
      <div><h2>${c}</h2><div class="csub">${v.length} parts sourced · ${red} need action</div></div></div>
    <div class="cstats">
      <div class="cstat red"><div class="cn">${money(imp)}</div><div class="cl">annual tariff cost</div></div>
      <div class="cstat"><div class="cn">${money(spend)}</div><div class="cl">spend from ${c}</div></div>
      <div class="cstat"><div class="cn">${ss}</div><div class="cl">single-source</div></div>
    </div>
    <div class="partlist">${parts.map(p=>`
      <div class="part" data-id="${p.id}">
        <div class="parthead"><span class="chev">▶</span>
          <span class="pnm">${p.desc}</span>
          <span class="pm"><span>HS <b>${p.hs}</b></span><span>tariff <b>${p.delta>0?'+'+p.delta.toFixed(0)+'%':'—'}</b></span>
            <span>impact <b>${p.impact>0?money(p.impact):'—'}</b></span>${p.single_source?'<span class="faint">single-source</span>':''}</span>
          <span class="band ${p.band}">${p.band}</span></div>
        <div class="decision">${partDecision(p)}</div>
      </div>`).join('')}</div>`;
  bindCountry();
}
function bindCountry(){
  $$('#cview .parthead').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('open'));
  $$('#cview .abtn').forEach(b=>b.onclick=e=>{e.stopPropagation();decisions[b.dataset.id]=b.dataset.act;
    openCountry(selCountry); const el=[...$$('#cview .part')].find(x=>x.dataset.id===b.dataset.id); if(el)el.classList.add('open');
    renderRibbon(); });
}
$('#backBtn').onclick=()=>{ $('#cview').classList.remove('on'); $('#mapView').style.display='block';
  $('#backBtn').style.display='none'; $('#stageTitle').textContent='Your sourcing map'; selCountry=null; };

/* ---- ribbon ---- */
function renderRibbon(){
  const v=view();
  const imp=v.reduce((a,p)=>a+p.impact,0), spend=v.reduce((a,p)=>a+p.spend,0);
  const atrisk=v.filter(p=>p.band!=='Green').reduce((a,p)=>a+p.spend,0);
  const need=v.filter(p=>p.band==='Red').length;
  const done=Object.keys(decisions).length;
  $('#ribbon').innerHTML=`
    <div class="kpi red"><span class="lbl">Annual tariff cost</span><span class="val">${money(imp)}</span><span class="sub">on inbound parts</span></div>
    <div class="kpi amber"><span class="lbl">At-risk spend</span><span class="val">${(100*atrisk/spend).toFixed(1)}%</span><span class="sub">${money(atrisk)} exposed</span></div>
    <div class="kpi"><span class="lbl">Parts needing action</span><span class="val">${need}</span><span class="sub">Red band</span></div>
    <div class="kpi plum"><span class="lbl">Decisions logged</span><span class="val">${done}</span><span class="sub">of ${need} priorities</span></div>`;
}

/* ---- insights ---- */
function renderInsights(){
  const v=view(), tot=v.reduce((a,p)=>a+p.impact,0);
  const byC={}; v.forEach(p=>{if(p.impact>0)byC[p.country]=(byC[p.country]||0)+p.impact;});
  const topC=Object.entries(byC).sort((a,b)=>b[1]-a[1])[0];
  const byCat={}; v.forEach(p=>{byCat[p.category]=(byCat[p.category]||0)+p.impact;});
  const topCat=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  const ss=v.filter(p=>p.single_source&&p.impact>0).length;
  const top=[...v].sort((a,b)=>b.impact-a.impact)[0];
  const watch=DATA.alerts.filter(a=>a.status==='Announced'||a.status==='Under review').length;
  const ins=[
    topC?`${topC[0]} drives ${money(topC[1])} of your ${money(tot)} tariff cost — your top country to de-risk.`:'',
    topCat?`${topCat[0]} is the most exposed category at ${money(topCat[1])}.`:'',
    `${ss} tariff-hit parts are single-sourced — no fallback if a measure escalates.`,
    top&&top.impact>0?`One part, ${top.desc} from ${top.country}, costs ${money(top.impact)}/yr alone.`:'',
    `${watch} measures are Announced or Under review — ask the assistant to model them.`,
  ].filter(Boolean);
  $('#insPane').innerHTML=ins.map((t,i)=>`<div class="insight"><span class="in">${i+1}</span><span>${t}</span></div>`).join('');
}

/* ---- assistant ---- */
const CHIPS=["Where's my biggest risk?","Show single-source parts","What if Japan chips get a 20% tariff?","How do I de-risk display modules?"];
function addBubble(who,html){const b=document.createElement('div');b.className='bubble '+who;b.innerHTML=html;$('#chat').appendChild(b);$('#chat').scrollTop=1e9;}
function renderChips(){$('#chips').innerHTML=CHIPS.map(c=>`<button class="chip">${c}</button>`).join('');
  $$('#chips .chip').forEach(c=>c.onclick=()=>{ $('#ask').value=c.textContent; sendAsk(); });}
function answer(q){
  const v=view(), ql=q.toLowerCase();
  const tot=v.reduce((a,p)=>a+p.impact,0);
  // what-if
  const numM=ql.match(/(-?\d+(\.\d+)?)\s*%?/); const cName=DATA.countries.find(c=>ql.includes(c.toLowerCase()));
  const SYN={chip:'Semiconductors/ICs',chips:'Semiconductors/ICs',semiconductor:'Semiconductors/ICs',display:'Display Modules',screen:'Display Modules',lcd:'Display Modules',oled:'Display Modules',battery:'Li-ion Cells & Batteries',cell:'Li-ion Cells & Batteries',capacitor:'Capacitors',connector:'Connectors',pcb:'PCB & Laminates'};
  let cat=DATA.categories.find(c=>ql.includes(c.toLowerCase().split('/')[0].split(' ')[0]));
  if(!cat){for(const k in SYN){if(ql.includes(k)){cat=SYN[k];break;}}}
  if((ql.includes('what if')||ql.includes('if ')||ql.includes('raise')||ql.includes('rises')||ql.includes('tariff'))&&numM&&cName){
    scenario={country:cName,category:cat||null,delta:parseFloat(numM[1])};
    renderRibbon(); renderMap(); renderInsights();
    const nv=view(), nt=nv.reduce((a,p)=>a+p.impact,0), hit=nv.filter(p=>p.country===cName&&(!cat||p.category===cat));
    scen('on');
    if(hit.length===0) return `There are no parts sourced from <b>${cName}</b>${cat?' in '+cat:''}, so nothing moves. Try Japan · Semiconductors.`;
    const base=DATA.parts.reduce((a,p)=>{const s=scenario;scenario=null;const b=calc(p).impact;scenario=s;return a+b;},0);
    return `Modeled <b>+${parseFloat(numM[1])}%</b> on ${cName}${cat?' '+cat:''}. Annual tariff cost would move from <b>${money(base)}</b> to <b>${money(nt)}</b> — a change of <b>${money(nt-base)}</b>/yr across ${hit.length} parts. The map is re-coloured to match — reset to clear.`;
  }
  if(ql.includes('biggest')||ql.includes('top')||ql.includes('worst')||ql.includes('most')){
    const byC={}; v.forEach(p=>{if(p.impact>0)byC[p.country]=(byC[p.country]||0)+p.impact;});
    const arr=Object.entries(byC).sort((a,b)=>b[1]-a[1]).slice(0,3);
    return `Your biggest exposure is <b>${arr[0][0]}</b> at ${money(arr[0][1])}/yr.<ul>${arr.map(([c,x])=>`<li>${c} — ${money(x)}</li>`).join('')}</ul>Open ${arr[0][0]} on the map to see the parts and re-sourcing options.`;
  }
  if(ql.includes('single')||ql.includes('backup')||ql.includes('no source')){
    const ss=v.filter(p=>p.single_source&&p.impact>0).sort((a,b)=>b.impact-a.impact).slice(0,5);
    return `You have <b>${v.filter(p=>p.single_source&&p.impact>0).length}</b> single-source, tariff-hit parts — the priority to second-source:<ul>${ss.map(p=>`<li>${p.desc} (${p.country}) — ${money(p.impact)}/yr</li>`).join('')}</ul>`;
  }
  if(ql.includes('de-risk')||ql.includes('reduce')||ql.includes('mitigate')||ql.includes('lower')||ql.includes('fix')){
    let target=cat; if(!target){const byCat={};v.forEach(p=>{byCat[p.category]=(byCat[p.category]||0)+p.impact;});target=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0][0];}
    const parts=v.filter(p=>p.category===target&&p.impact>0).sort((a,b)=>b.impact-a.impact).slice(0,3);
    return `To de-risk <b>${target}</b>:<ul>${parts.map(p=>{const alt=alternatives(p).cands[0];return `<li>${p.desc} (${p.country}) → ${alt&&alt.save>0?'re-source to '+alt.country+', save '+money(alt.save):'add second source'}</li>`;}).join('')}</ul>Open the category's country on the map to log these actions.`;
  }
  if(ql.includes('total')||ql.includes('cost')||ql.includes('how much')){
    return `Total added tariff cost is <b>${money(tot)}/yr</b> across ${v.length} parts. ${v.filter(p=>p.band==='Red').length} parts are Red (act now).`;
  }
  if(cName){
    const cv=v.filter(p=>p.country===cName), imp=cv.reduce((a,p)=>a+p.impact,0);
    return imp>0? `${cName}: ${money(imp)}/yr across ${cv.filter(p=>p.impact>0).length} tariff-hit parts. Open it on the map for options.`
      : `${cName} has no active tariff exposure right now.`;
  }
  return `I can help you find and fix tariff exposure. Try one of the suggestions below, or ask about a country, a category, or a "what-if" tariff.`;
}
function sendAsk(){const q=$('#ask').value.trim(); if(!q)return; addBubble('u',q); $('#ask').value='';
  setTimeout(()=>addBubble('a',answer(q)),160);}
$('#send').onclick=sendAsk; $('#ask').addEventListener('keydown',e=>{if(e.key==='Enter')sendAsk();});
function scen(on){$('#scenReset')&&$('#scenReset').remove(); if(on==='on'){/* handled by bubble */}}

/* ---- tabs ---- */
$('#tabAsst').onclick=()=>{$('#tabAsst').classList.add('on');$('#tabIns').classList.remove('on');$('#asstPane').classList.add('on');$('#insPane').style.display='none';};
$('#tabIns').onclick=()=>{$('#tabIns').classList.add('on');$('#tabAsst').classList.remove('on');$('#asstPane').classList.remove('on');$('#insPane').style.display='block';renderInsights();};

/* ---- tour ---- */
const STEPS=[
  {sel:'#ribbon',t:'Your headline numbers',b:'Total tariff cost on what you buy, how much spend is at risk, how many parts need a decision, and how many you\u2019ve resolved.',pos:'below'},
  {sel:'#stage',t:'Your sourcing map',b:'Every country you buy from, sized by spend and coloured by tariff exposure. Red countries are costing you money right now.',pos:'right',on:()=>backToMap()},
  {sel:'#stage',t:'Drill into a country',b:'Tap a hot country \u2014 here\u2019s China \u2014 to see exactly which parts are tariff-hit and by how much.',pos:'right',on:()=>openCountry('China')},
  {sel:'#cview .part',t:'Decide, don\u2019t just read',b:'Open a part and the desk ranks cheaper alternative origins with should-cost, then lets you log a sourcing action in one click.',pos:'right',on:()=>{const p=$('#cview .part');if(p)p.classList.add('open');}},
  {sel:'#side',t:'Ask the assistant',b:'Ask in plain English \u2014 \u201cwhere\u2019s my biggest risk?\u201d or \u201cwhat if Japan chips get a 20% tariff?\u201d It answers and re-colours the map.',pos:'left',on:()=>$('#tabAsst').click()},
  {sel:'#side',t:'Insights for your review',b:'A plain-language summary of the whole picture \u2014 ready to drop into your next category review.',pos:'left',on:()=>$('#tabIns').click()},
];
let ti=0;
function backToMap(){if(selCountry){$('#cview').classList.remove('on');$('#mapView').style.display='block';$('#backBtn').style.display='none';selCountry=null;}}
function place(el){const r=el.getBoundingClientRect(),c=$('#tCard');c.style.display='block';const ch=c.offsetHeight,cw=c.offsetWidth;
  let top=r.bottom+12,left=r.left; const s=STEPS[ti];
  if(s.pos==='right'){left=r.right+14;top=Math.max(12,r.top);} if(s.pos==='left'){left=r.left-cw-14;top=Math.max(12,r.top);}
  if(s.pos==='below'){top=r.bottom+12;left=r.left;}
  if(left+cw>innerWidth-8)left=innerWidth-cw-8; if(left<8)left=8;
  if(top+ch>innerHeight-8)top=Math.max(8,innerHeight-ch-8);
  c.style.top=top+'px';c.style.left=left+'px';}
function showStep(){$$('.t-hi').forEach(e=>e.classList.remove('t-hi'));const s=STEPS[ti];if(s.on)s.on();
  setTimeout(()=>{const el=$(s.sel)||$('#stage');el.classList.add('t-hi');el.scrollIntoView({behavior:'smooth',block:'center'});
    $('#tStep').textContent='Step '+(ti+1)+' of '+STEPS.length;$('#tTitle').textContent=s.t;$('#tBody').textContent=s.b;
    $('#tDots').innerHTML=STEPS.map((_,i)=>`<i class="${i===ti?'on':''}"></i>`).join('');
    $('#tBack2').style.visibility=ti?'visible':'hidden';$('#tNext').textContent=ti===STEPS.length-1?'Done':'Next';
    setTimeout(()=>place(el),260);},120);}
function startTour(){ti=0;$('#tBack').style.display='block';$('#tCard').style.display='block';showStep();}
function endTour(){$('#tBack').style.display='none';$('#tCard').style.display='none';$$('.t-hi').forEach(e=>e.classList.remove('t-hi'));}
$('#tourBtn').onclick=startTour;$('#tSkip').onclick=endTour;
$('#tBack2').onclick=()=>{if(ti){ti--;showStep();}};$('#tNext').onclick=()=>{ti<STEPS.length-1?(ti++,showStep()):endTour();};

/* ---- init ---- */
renderRibbon(); renderMap(); renderInsights(); renderChips();
addBubble('a','Hi \u2014 I\u2019m your sourcing assistant. I can find where tariffs are hitting your parts and suggest where to move them. Ask me anything, or tap a suggestion below.');
</script>
</body>
</html>
