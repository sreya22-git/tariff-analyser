<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tariff Impact Analyzer — Procurement</title>
    <link rel="icon" href="https://raw.githubusercontent.com/gramener/assets/main/straive-favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/custom.css') }}">
</head>
<body>

    <nav class="navbar topbar">
        <div class="container-fluid">
            <a class="navbar-brand sidebar-toggle-btn" href="#" id="sidebar-toggle">
                <img src="{{ url_for('static', path='images/logo.png') }}" alt="Logo" class="straive-logo-topbar">
                <span>Tariff Impact Analyzer <small class="d-block d-md-inline text-muted-light">— Procurement</small></span>
            </a>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="/"><i class="fa fa-file-import fa-fw me-2"></i><span class="sidebar-text">Procurement <br> Ingestion</span></a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fa fa-chart-bar fa-fw me-2"></i><span class="sidebar-text">Tariff Impact <br> Dashboard</span></a></li>
            <li class="nav-item"><a class="nav-link" href="/analysisDetails"><i class="fa fa-search-dollar fa-fw me-2"></i><span class="sidebar-text">Analysis Details</span></a></li>
        </ul>
        <div class="sidebar-footer mt-auto"></div>
    </div>
    <div class="main-content" id="main-content">
        <main class="container-fluid py-4">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        (function () {
            var toggle = document.getElementById('sidebar-toggle');
            var sidebar = document.getElementById('sidebar');
            var main = document.getElementById('main-content');
            if (!toggle || !sidebar || !main) return;
            toggle.addEventListener('click', function (e) {
                e.preventDefault();
                sidebar.classList.toggle('collapsed');
                main.classList.toggle('collapsed');
            });
        })();
    </script>
</body>
</html>
